# .github/workflows/deploy.yml
# Cloudflare Pages deploy GitHub Actions-ből
# Szükséges secrets (GitHub → Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN  → Cloudflare dashboard → API Tokens → Create Token
#   CLOUDFLARE_ACCOUNT_ID → Cloudflare dashboard → jobb oldal
#   DASHSCOPE_API_KEY     → Alibaba Cloud Model Studio → API Key

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manuális indítás + opcionális tartalom generálás
  workflow_dispatch:
    inputs:
      generate_content:
        description: "Generálj új tartalmat deploy előtt?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      batch_file:
        description: "Batch JSON fájl útvonala (pl: topics.json)"
        required: false
        default: ""

jobs:
  # ── 1. Opcionális tartalom generálás ─────────────────────
  generate:
    name: Generate content (optional)
    runs-on: ubuntu-latest
    if: github.event.inputs.generate_content == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate content
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          BATCH="${{ github.event.inputs.batch_file }}"
          if [ -n "$BATCH" ] && [ -f "$BATCH" ]; then
            node scripts/generate-content.mjs --batch "$BATCH"
          else
            echo "Nincs batch fájl megadva, kihagyva."
          fi

      - name: Commit generated content
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: AI-generált tartalom hozzáadása [skip ci]"
          file_pattern: "src/content/blog/*.mdx"

  # ── 2. Build + Deploy ─────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [generate]
    if: always() && (needs.generate.result == 'success' || needs.generate.result == 'skipped')
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          # Ha van .env.production fájlod, itt adhatod meg a változókat
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: portfolio          # ← Cloudflare Pages projekt neve
          directory:   dist               # Astro build output
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "3"

  # ── 3. Gitea mirror ───────────────────────────────────────
  mirror:
    name: Mirror to Gitea
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # teljes history mirror-hoz

      - name: Push to Gitea
        env:
          GITEA_URL:   ${{ secrets.GITEA_URL }}   # pl: https://gitea.homelab.local
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}  # Gitea → Settings → Applications
        run: |
          git remote add gitea "https://oauth2:${GITEA_TOKEN}@${GITEA_URL#https://}/yourname/portfolio.git" || true
          git push gitea main --force
